<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a href="{{ '/' | relative_url }}" class="site-title">AT<span class="accent">.</span> Journal</a>
      <span class="site-subtitle">{{ site.description }}</span>
    </div>
  </header>

  <main class="content">
    {{ content }}
  </main>

  <footer class="site-footer">
    © {{ site.time | date: "%Y" }} Abhishek Trivedi · Personal record
  </footer>
</body>
</html>
